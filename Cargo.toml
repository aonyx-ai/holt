[workspace]
members = ["crates/*"]

# Opt-in to the new feature resolver introduced in Rust 1.51 and Edition 2021.
# https://doc.rust-lang.org/cargo/reference/resolver.html#resolver-versions
resolver = "2"

[workspace.package]
version = "0.0.0"
edition = "2024"

description = "A UI toolkit for Leptos"
license = "Apache-2.0 OR MIT"
repository = "https://github.com/aonyx-rs/holt.git"

# Edition 2024 requires Rust 1.85 or later
rust-version = "1.85"

[workspace.dependencies]
leptos = "0.8.0"
leptos_router = "0.8.0"
leptos_meta = "0.8.0"
tailwind_fuse = { version = ">=0.3.0", features = ["variant"] }
