---
name: Claude Code Review
permissions: {}

"on":
  issue_comment:
    types: [created]

jobs:
  claude-review:
    name: Claude Code Review
    # Only run on PR comments containing @claude review
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude review')

    runs-on: ubuntu-latest
    concurrency:
      group: "claude-review-${{ github.event.issue.number }}"
      cancel-in-progress: true

    permissions:
      contents: read # Checkout code
      pull-requests: read # Read PR details
      issues: read # Read issue comments
      id-token: write # Authenticate with Claude

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@4e5d8b13ca281a6d163cdb287d8917b216e00d6f # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/sdk#command-line for available options
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
