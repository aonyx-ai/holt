---
name: Claude Code
permissions: {}

"on":
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '@claude review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '@claude review')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && !contains(github.event.review.body, '@claude review')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && !contains(github.event.issue.body, '@claude review') && !contains(github.event.issue.title, '@claude review'))
    runs-on: ubuntu-latest
    concurrency:
      group: "claude-${{ github.event.issue.number || github.event.pull_request.number }}"
      cancel-in-progress: true

    permissions:
      contents: read # Checkout code
      pull-requests: read # Read PR details
      issues: read # Read issue comments
      id-token: write # Authenticate with Claude
      actions: read # Read CI results on PRs
    name: Claude

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/sdk#command-line for available options
          claude_args: |
            --allowed-tools Bash(gh pr:*),WebFetch(domain:github.com),WebSearch,Bash(just),Bash(cargo check:*),Bash(cargo test),Bash(cargo test:*),Bash(wasm-pack test:*),WebFetch(domain:rustwasm.github.io),WebFetch(domain:book.leptos.dev),Bash(find:*),Bash(git add:*),Bash(earthly +check-minimal-deps:*)
