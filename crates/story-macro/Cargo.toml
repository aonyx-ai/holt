[package]
name = "holt-story-macro"

version.workspace = true
edition.workspace = true

[lib]
proc-macro = true

[dependencies]
syn = { version = ">=2.0.95,<3", default-features = false, features = [
  "parsing",
  "full",
  "proc-macro",
] }
quote = "1.0"
proc-macro2 = "1.0"

[dev-dependencies]
holt-book = { path = "../book" }
leptos = "0.8.0"
