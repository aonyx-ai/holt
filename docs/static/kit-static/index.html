<!doctype html>
<html lang="en" dir="ltr" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holt UI Kit</title>
    <link rel="stylesheet" href="/kit-static/styles.css" />
  </head>
  <body>
    <div class="flex h-screen w-screen overflow-hidden">
      <div
        class="group/sidebar-wrapper flex min-h-svh w-full has-[[data-variant=inset]]:bg-sidebar"
        style="--sidebar-width: 16rem; --sidebar-width-icon: 3rem"
      >
        <div
          data-state="expanded"
          data-collapsible=""
          data-variant="sidebar"
          data-side="left"
          class="group peer hidden text-sidebar-foreground md:block"
        >
          <div
            class="relative w-[var(--sidebar-width)] bg-transparent transition-[width] duration-200 ease-linear group-data-[collapsible=offcanvas]:w-0 group-data-[side=right]:rotate-180 group-data-[collapsible=icon]:w-[var(--sidebar-width-icon)]"
          ></div>
          <div
            class="fixed inset-y-0 z-10 hidden h-svh w-[var(--sidebar-width)] transition-[left,right,width] duration-200 ease-linear md:flex left-0 group-data-[collapsible=offcanvas]:left-[calc(var(--sidebar-width)*-1)] group-data-[collapsible=icon]:w-[var(--sidebar-width-icon)] group-data-[side=left]:border-r group-data-[side=right]:border-l"
          >
            <div
              data-sidebar="sidebar"
              class="flex h-full w-full flex-col bg-sidebar group-data-[variant=floating]:rounded-lg group-data-[variant=floating]:border group-data-[variant=floating]:border-sidebar-border group-data-[variant=floating]:shadow"
            >
              <div
                class="sticky top-0 h-[60px] flex items-center border-b border-sidebar-border px-4 py-2"
              >
                <h1
                  class="scroll-m-20 text-4xl font-extrabold tracking-tight lg:text-5xl"
                >
                  H
                </h1>
              </div>
              <div class="flex-1 overflow-auto py-2">
                <nav class="space-y-1">
                  <h2 class="mb-2 text-lg font-semibold">Stories</h2>
                  <ul class="space-y-1">
                    <li>
                      <a
                        href="/kit-static/story/breadcrumb"
                        class="block px-2 py-1 rounded hover:bg-muted"
                        >Breadcrumb</a
                      >
                    </li>
                    <li>
                      <a
                        href="/kit-static/story/checkbox"
                        class="block px-2 py-1 rounded hover:bg-muted"
                        >Checkbox</a
                      >
                    </li>
                    <li>
                      <a
                        href="/kit-static/story/select"
                        class="block px-2 py-1 rounded hover:bg-muted"
                        >Select</a
                      >
                    </li>
                    <li>
                      <a
                        href="/kit-static/story/collapsible"
                        class="block px-2 py-1 rounded hover:bg-muted"
                        >Collapsible</a
                      >
                    </li>
                    <li>
                      <a
                        href="/kit-static/story/input"
                        class="block px-2 py-1 rounded hover:bg-muted"
                        >Input</a
                      >
                    </li>
                    <li>
                      <a
                        href="/kit-static/story/label"
                        class="block px-2 py-1 rounded hover:bg-muted"
                        >Label</a
                      >
                    </li>
                    <li>
                      <a
                        href="/kit-static/story/switch"
                        class="block px-2 py-1 rounded hover:bg-muted"
                        >Switch</a
                      >
                    </li>
                    <li>
                      <a
                        href="/kit-static/story/toggle"
                        class="block px-2 py-1 rounded hover:bg-muted"
                        >Toggle</a
                      >
                    </li>
                    <li>
                      <a
                        href="/kit-static/story/button"
                        class="block px-2 py-1 rounded hover:bg-muted"
                        >Button</a
                      >
                    </li>
                    <li>
                      <a
                        href="/kit-static/story/card"
                        class="block px-2 py-1 rounded hover:bg-muted"
                        >Card</a
                      >
                    </li>
                    <li>
                      <a
                        href="/kit-static/story/textarea"
                        class="block px-2 py-1 rounded hover:bg-muted"
                        >Textarea</a
                      >
                    </li>
                    <li>
                      <a
                        href="/kit-static/story/badge"
                        class="block px-2 py-1 rounded hover:bg-muted"
                        >Badge</a
                      >
                    </li>
                    <!>
                  </ul>
                </nav>
              </div>
            </div>
          </div>
        </div>
        <main
          class="relative flex w-full flex-1 flex-col bg-background md:peer-data-[variant=inset]:m-2 md:peer-data-[state=collapsed]:peer-data-[variant=inset]:ml-2 md:peer-data-[variant=inset]:ml-0 md:peer-data-[variant=inset]:rounded-xl md:peer-data-[variant=inset]:shadow"
        >
          <header class="flex h-16 shrink-0 items-center gap-2 border-b px-4">
            <button
              title="Toggle sidebar"
              aria-label="Toggle sidebar"
              data-state="open"
              class="inline-flex items-center justify-center rounded-md text-sm font-medium h-9 w-9 px-0 transition-colors hover:bg-sidebar-accent hover:text-sidebar-accent-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-sidebar-ring -ml-1"
            >
              <span class="sr-only">Toggle sidebar</span
              ><span aria-hidden="true">≡</span></button
            >Components
          </header>
          <div class="flex flex-1 flex-col overflow-hidden">
            <div class="flex-1 overflow-auto p-4">no story selected</div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
