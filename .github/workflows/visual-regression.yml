---
name: Visual Regression

permissions: {}

"on":
  pull_request:
    paths:
      - "crates/book/**"
      - "crates/kit/**"
      - "crates/kit-docs/**"

jobs:
  visual-regression:
    name: Visual Regression
    runs-on: warp-ubuntu-latest-x64-2x
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR
        uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0 # Fetch full history to allow checking out PR commits

      - name: Install Flox
        uses: flox/install-flox-action@ba0eb4eb776f1d3b47279d7980f6643caffd8c41 # 2.0.0
        with:
          version: 1.6.1

      - name: Remove Flox installer (if it exists)
        run: rm -f flox.x86_64-linux.deb

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # 2.8.1
        with:
          prefix-key: "v0-visual-regression"
          cache-on-failure: true
          cache-provider: "warpbuild"

      - name: Get baseline screenshots from main
        run: |
          # Fetch baselines from main branch - these will be used for comparison
          git fetch origin main
          git checkout origin/main -- crates/kit-docs/tests/visual-baselines || echo "No baselines in main"
          tree crates/kit-docs/tests/visual-baselines/

      - name: Build visual regression binary
        run: |
          flox activate -- cargo build --bin visual-regression --features visual-regression -p holt-kit-docs --release

      - name: Run visual regression tests
        id: visual-regression
        timeout-minutes: 20
        env:
          CI: true
        run: |
          # Create output directories for artifacts
          mkdir -p visual-regression-output/baseline
          mkdir -p visual-regression-output/new

          # Save main baselines for artifact upload
          if [ -d "crates/kit-docs/tests/visual-baselines" ]; then
            cp -r crates/kit-docs/tests/visual-baselines/* visual-regression-output/baseline/ 2>/dev/null || true
          fi

          # Run visual regression from crates/kit-docs (tool expects relative paths from there)
          cd crates/kit-docs
          set +e  # Disable exit on error
          flox activate -- cargo run --bin visual-regression --features visual-regression -p holt-kit-docs --release 2>&1 | tee ../../visual-regression.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e  # Re-enable exit on error
          cd ../..

          # Save new screenshots for artifact upload
          if [ -d "crates/kit-docs/tests/visual-baselines" ]; then
            cp -r crates/kit-docs/tests/visual-baselines/* visual-regression-output/new/ 2>/dev/null || true
          fi

          # Check if there were any differences
          if [ $EXIT_CODE -ne 0 ]; then
            echo "HAS_CHANGES=true" >> "$GITHUB_OUTPUT"
          else
            echo "HAS_CHANGES=false" >> "$GITHUB_OUTPUT"
          fi

          # Exit with the original exit code
          exit $EXIT_CODE

      - name: Upload visual regression artifacts
        if: always() && steps.visual-regression.outputs.HAS_CHANGES == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: visual-regression-screenshots
          path: visual-regression-output/

      - name: Generate comparison report
        if: always() && steps.visual-regression.outputs.HAS_CHANGES == 'true'
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          cat > comment.md << 'EOF'
          ## 📸 Visual Changes Detected

          This PR includes visual changes to the following components:

          EOF

          # Parse the log file for changes and list them
          grep -E "(differs from baseline|new baseline)" visual-regression.log | while read -r line; do
            if echo "$line" | grep -q "differs from baseline"; then
              story=$(echo "$line" | sed -n 's/.*✗ \([^/]*\)\/\([^ ]*\) differs.*/\1\/\2/p')
              echo "- 🔄 **Modified:** \`$story\`" >> comment.md

            elif echo "$line" | grep -q "new baseline"; then
              story=$(echo "$line" | sed -n 's/.*+ \([^/]*\)\/\([^ ]*\) (new.*/\1\/\2/p')
              echo "- ✨ **New Component:** \`$story\`" >> comment.md
            fi
          done

          cat >> comment.md << EOF

          ---

          ### 📥 Download Screenshots

          To view the actual screenshots and compare changes:

          1. Go to the [workflow run](https://github.com/${REPOSITORY}/actions/runs/${RUN_ID})
          2. Download the **visual-regression-screenshots** artifact
          3. Compare the images in the \`baseline/\` and \`new/\` directories

          > 💡 To update the baseline images, run \`just kit-docs test-visual\` locally, review and accept the changes, then commit the updated baselines.

          EOF

      - name: Post PR comment
        if: always() && steps.visual-regression.outputs.HAS_CHANGES == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('comment.md', 'utf8');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Visual Regression Test Results')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Summary
        run: |
          if [ "${STEPS_VISUAL_REGRESSION_OUTPUTS_HAS_CHANGES}" == "true" ]; then
            echo "📸 Visual changes detected - see PR comment for details"
          else
            echo "✅ No visual changes detected"
          fi

        env:
          STEPS_VISUAL_REGRESSION_OUTPUTS_HAS_CHANGES: ${{ steps.visual-regression.outputs.has_changes }}
