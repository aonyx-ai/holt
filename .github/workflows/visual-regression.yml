---
name: Visual Regression

permissions: {}

"on":
  pull_request:

concurrency:
  group: "visual-regression-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Post regression report comments
      contents: read # Checkout code

    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: true
          fetch-depth: 0 # Fetch full history to allow checking out PR commits

      - name: Check for relevant changes
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: |
            crates/book/**
            crates/cli/**
            crates/kit/**
            crates/kit-docs/**
            crates/regression/**

      - name: Skip if no relevant changes
        if: steps.changed-files.outputs.any_changed != 'true'
        run: echo "No visual-regression-relevant files changed — skipping."

      - name: Install Flox
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: flox/install-flox-action@9428713e8d3883274c334b4b95b8830beebd24d2 # 2.3.0
        with:
          # renovate: datasource=github-releases depName=flox/flox
          version: 1.10.0

      - name: Remove Flox installer (if it exists)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: rm -f flox.x86_64-linux.deb

      - name: Cache Rust artifacts
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # 2.9.1
        with:
          prefix-key: "v0-visual-regression"
          cache-on-failure: true

      - name: Prepare baselines for comparison
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          # Save PR branch baselines (if they exist)
          if [ -d "crates/kit-docs/tests/visual-baselines" ]; then
            echo "Saving PR branch baselines for later comparison..."
            cp -r crates/kit-docs/tests/visual-baselines crates/kit-docs/tests/pr-baselines
          fi

          # Fetch baselines from main branch - these will be used for visual regression test
          git fetch origin main
          rm -rf crates/kit-docs/tests/visual-baselines
          git checkout origin/main -- crates/kit-docs/tests/visual-baselines || echo "No baselines in main"

          echo "Baselines from main:"
          tree crates/kit-docs/tests/visual-baselines/ || echo "No baselines in main"

      - name: Build holt CLI
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          flox activate -- cargo build -p holt-cli --release

      - name: Run visual regression tests
        if: steps.changed-files.outputs.any_changed == 'true'
        id: visual-regression
        timeout-minutes: 20
        run: |
          # Create output directories for artifacts
          mkdir -p visual-regression-output/baseline
          mkdir -p visual-regression-output/new

          # Save main baselines for artifact upload
          if [ -d "crates/kit-docs/tests/visual-baselines" ]; then
            cp -r crates/kit-docs/tests/visual-baselines/* visual-regression-output/baseline/ 2>/dev/null || true
          fi

          # Run visual regression (saves new screenshots for artifact upload)
          set +e
          flox activate -- cargo run -p holt-cli --release -- snapshot --report visual-regression-output/report.html 2>&1 | tee visual-regression.log
          REGRESSION_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # Fail fast if the snapshot command itself crashed (not a visual diff)
          if [ $REGRESSION_EXIT_CODE -ne 0 ] && ! grep -q "\[ok\]\|\[FAIL\]\|\[new\]" visual-regression.log; then
            echo "Snapshot command failed before producing any results"
            cat visual-regression.log
            exit 1
          fi

          # Save new screenshots for artifact upload
          if [ -d "crates/kit-docs/tests/visual-baselines" ]; then
            cp -r crates/kit-docs/tests/visual-baselines/* visual-regression-output/new/ 2>/dev/null || true
          fi

          if [ $REGRESSION_EXIT_CODE -ne 0 ]; then
            echo "Visual differences detected compared to main"

            # Check if PR branch already committed these baselines
            if [ -d "crates/kit-docs/tests/pr-baselines" ]; then
              echo "Checking if changes are already committed in PR branch..."
              if diff -r visual-regression-output/new crates/kit-docs/tests/pr-baselines > /dev/null 2>&1; then
                echo "New screenshots match PR's committed baselines - changes already accepted"
                echo "HAS_CHANGES=false" >> "$GITHUB_OUTPUT"
                exit 0
              else
                echo "New screenshots differ from PR's committed baselines"
                echo "HAS_CHANGES=true" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              echo "No baselines committed in PR branch yet"
              echo "HAS_CHANGES=true" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "HAS_CHANGES=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Report results
        if: always() && steps.changed-files.outputs.any_changed == 'true'
        uses: ./.github/actions/visual-regression-report
        with:
          has-changes: ${{ steps.visual-regression.outputs.HAS_CHANGES }}
          quick-accept-command: "just kit-docs load-baselines-from-gh-artifact ${{ github.run_id }}"
