---
name: Visual Regression

permissions: {}

"on":
  pull_request:
    paths:
      - "crates/book/**"
      - "crates/kit/**"
      - "crates/kit-docs/**"

jobs:
  visual-regression:
    name: Visual Regression
    runs-on: warp-ubuntu-latest-x64-2x
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR
        uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0 # Fetch full history to allow checking out PR commits

      - name: Install Flox
        uses: flox/install-flox-action@819183ecd53757be53d66f492eeb7d689687a66b # 2.1.0
        with:
          version: 1.6.1

      - name: Remove Flox installer (if it exists)
        run: rm -f flox.x86_64-linux.deb

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # 2.8.1
        with:
          prefix-key: "v0-visual-regression"
          cache-on-failure: true
          cache-provider: "warpbuild"

      - name: Prepare baselines for comparison
        run: |
          # Save PR branch baselines (if they exist)
          if [ -d "crates/kit-docs/tests/visual-baselines" ]; then
            echo "Saving PR branch baselines for later comparison..."
            cp -r crates/kit-docs/tests/visual-baselines crates/kit-docs/tests/pr-baselines
          fi

          # Fetch baselines from main branch - these will be used for visual regression test
          git fetch origin main
          rm -rf crates/kit-docs/tests/visual-baselines
          git checkout origin/main -- crates/kit-docs/tests/visual-baselines || echo "No baselines in main"

          echo "Baselines from main:"
          tree crates/kit-docs/tests/visual-baselines/ || echo "No baselines in main"

      - name: Build visual regression binary
        run: |
          flox activate -- cargo build --bin visual-regression --features visual-regression -p holt-kit-docs --release

      - name: Run visual regression tests
        id: visual-regression
        timeout-minutes: 20
        env:
          CI: true
        run: |
          # Create output directories for artifacts
          mkdir -p visual-regression-output/baseline
          mkdir -p visual-regression-output/new

          # Save main baselines for artifact upload
          if [ -d "crates/kit-docs/tests/visual-baselines" ]; then
            cp -r crates/kit-docs/tests/visual-baselines/* visual-regression-output/baseline/ 2>/dev/null || true
          fi

          # Run visual regression from crates/kit-docs (tool expects relative paths from there)
          cd crates/kit-docs
          set +e  # Disable exit on error
          flox activate -- cargo run --bin visual-regression --features visual-regression -p holt-kit-docs --release 2>&1 | tee ../../visual-regression.log
          REGRESSION_EXIT_CODE=${PIPESTATUS[0]}
          set -e  # Re-enable exit on error
          cd ../..

          # Save new screenshots for artifact upload
          if [ -d "crates/kit-docs/tests/visual-baselines" ]; then
            cp -r crates/kit-docs/tests/visual-baselines/* visual-regression-output/new/ 2>/dev/null || true
          fi

          # If visual regression found differences, check if they're already committed in PR
          if [ $REGRESSION_EXIT_CODE -ne 0 ]; then
            echo "Visual differences detected compared to main"

            # Check if PR branch has baselines
            if [ -d "crates/kit-docs/tests/pr-baselines" ]; then
              echo "Checking if changes are already committed in PR branch..."

              # Compare new screenshots with PR's committed baselines
              if diff -r crates/kit-docs/tests/visual-baselines crates/kit-docs/tests/pr-baselines > /dev/null 2>&1; then
                echo "✅ New screenshots match PR's committed baselines - changes already accepted!"
                echo "HAS_CHANGES=false" >> "$GITHUB_OUTPUT"
                exit 0
              else
                echo "❌ New screenshots differ from PR's committed baselines"
                echo "HAS_CHANGES=true" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              echo "No baselines committed in PR branch yet"
              echo "HAS_CHANGES=true" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "HAS_CHANGES=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Upload visual regression artifacts
        if: always() && steps.visual-regression.outputs.HAS_CHANGES == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: visual-regression-screenshots
          path: visual-regression-output/

      - name: Generate visual regression report
        if: always()
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HAS_CHANGES: ${{ steps.visual-regression.outputs.HAS_CHANGES }}
        run: |
          if [ "$HAS_CHANGES" == "true" ]; then
            cat > comment.md << 'EOF'
          ## 📸 Visual Regression Report

          This PR includes visual changes to the following components:

          EOF

            # Parse the log file for changes and list them
            grep -E "(differs from baseline|new baseline)" visual-regression.log | while read -r line; do
              if echo "$line" | grep -q "differs from baseline"; then
                story=$(echo "$line" | sed -n 's/.*✗ \([^/]*\)\/\([^ ]*\) differs.*/\1\/\2/p')
                echo "- 🔄 **Modified:** \`$story\`" >> comment.md

              elif echo "$line" | grep -q "new baseline"; then
                story=$(echo "$line" | sed -n 's/.*+ \([^/]*\)\/\([^ ]*\) (new.*/\1\/\2/p')
                echo "- ✨ **New Component:** \`$story\`" >> comment.md
              fi
            done

            cat >> comment.md << EOF

          ---

          ### ✅ Quick Accept

          To accept these visual changes, run:

          \`\`\`bash
          just kit-docs load-baselines-from-gh-artifact ${RUN_ID}
          \`\`\`

          This will download the new baselines, copy them to your local repository, and prepare them for commit.

          ---

          ### 📥 Manual Review

          To manually review the screenshots:

          1. Go to the [workflow run](https://github.com/${REPOSITORY}/actions/runs/${RUN_ID})
          2. Download the **visual-regression-screenshots** artifact
          3. Compare the images in the \`baseline/\` and \`new/\` directories

          Or run \`just kit-docs test-visual\` locally to review and accept changes interactively.

          EOF
          else
            cat > comment.md << 'EOF'
          ## 📸 Visual Regression Report

          ✅ All component screenshots match their baselines. No visual changes detected.
          EOF
          fi

      - name: Update PR comment
        if: always()
        uses: actions/github-script@v8
        env:
          HAS_CHANGES: ${{ steps.visual-regression.outputs.HAS_CHANGES }}
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('comment.md', 'utf8');
            const hasChanges = process.env.HAS_CHANGES === 'true';

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('📸 Visual Regression Report')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
              console.log('Updated existing comment');
            } else if (hasChanges) {
              // Only create new comment if there are changes
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
              console.log('Created new comment');
            } else {
              console.log('No changes and no existing comment - skipping');
            }

      - name: Summary
        env:
          HAS_CHANGES: ${{ steps.visual-regression.outputs.HAS_CHANGES }}
        run: |
          if [ "${HAS_CHANGES}" == "true" ]; then
            echo "📸 Visual changes detected - see PR comment for details"
          else
            echo "✅ No visual changes detected"
          fi
