---
name: Visual Regression (Reusable)

permissions: {}

"on":
  workflow_call:
    inputs:
      baseline-dir:
        description: "Baseline directory relative to book path"
        type: string
        default: "tests/visual-baselines"
      watch-paths:
        description: "Newline-separated globs for change detection"
        type: string
        required: true
      holt-version:
        description: "Version of holt-cli to install"
        type: string
        default: "latest"
      rust-toolchain:
        description: "Rust toolchain for cargo install"
        type: string
        default: "stable"

jobs:
  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Post regression report comments
      contents: read # Checkout code

    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Check for relevant changes
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: ${{ inputs.watch-paths }}

      - name: Skip if no relevant changes
        if: steps.changed-files.outputs.any_changed != 'true'
        run: echo "No visual-regression-relevant files changed — skipping."

      - name: Install Rust
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: ${{ inputs.rust-toolchain }}

      - name: Cache cargo install
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # 2.9.1
        with:
          prefix-key: "v0-visual-regression"
          cache-on-failure: true

      - name: Install holt-cli
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          HOLT_VERSION: ${{ inputs.holt-version }}
        run: |
          if [ "$HOLT_VERSION" = "latest" ]; then
            cargo install holt-cli
          else
            cargo install "holt-cli@${HOLT_VERSION}"
          fi

      - name: Prepare baselines for comparison
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          INPUT_BASELINE_DIR: ${{ inputs.baseline-dir }}
        run: |
          BOOK_PATH=$(grep -A5 '^\[book\]' holt.toml | grep 'path' | sed 's/.*= *"\(.*\)"/\1/' || echo ".")
          BASELINE_DIR="${BOOK_PATH}/${INPUT_BASELINE_DIR}"

          # Save PR branch baselines (if they exist)
          if [ -d "$BASELINE_DIR" ]; then
            echo "Saving PR branch baselines for later comparison..."
            cp -r "$BASELINE_DIR" "${BASELINE_DIR}-pr-copy"
          fi

          # Fetch baselines from main branch
          git fetch origin main
          rm -rf "$BASELINE_DIR"
          git checkout origin/main -- "$BASELINE_DIR" || echo "No baselines in main"

          echo "Baselines from main:"
          tree "$BASELINE_DIR" || echo "No baselines in main"

      - name: Run visual regression tests
        if: steps.changed-files.outputs.any_changed == 'true'
        id: visual-regression
        timeout-minutes: 20
        env:
          INPUT_BASELINE_DIR: ${{ inputs.baseline-dir }}
        run: |
          BOOK_PATH=$(grep -A5 '^\[book\]' holt.toml | grep 'path' | sed 's/.*= *"\(.*\)"/\1/' || echo ".")
          BASELINE_DIR="${BOOK_PATH}/${INPUT_BASELINE_DIR}"

          # Create output directories for artifacts
          mkdir -p visual-regression-output/baseline
          mkdir -p visual-regression-output/new

          # Save main baselines for artifact upload
          if [ -d "$BASELINE_DIR" ]; then
            cp -r "$BASELINE_DIR"/* visual-regression-output/baseline/ 2>/dev/null || true
          fi

          # Run visual regression
          set +e
          holt snapshot --report visual-regression-output/report.html 2>&1 | tee visual-regression.log
          REGRESSION_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # Fail fast if the snapshot command itself crashed
          if [ $REGRESSION_EXIT_CODE -ne 0 ] && ! grep -q "\[ok\]\|\[FAIL\]\|\[new\]" visual-regression.log; then
            echo "Snapshot command failed before producing any results"
            cat visual-regression.log
            exit 1
          fi

          # Save new screenshots for artifact upload
          if [ -d "$BASELINE_DIR" ]; then
            cp -r "$BASELINE_DIR"/* visual-regression-output/new/ 2>/dev/null || true
          fi

          if [ $REGRESSION_EXIT_CODE -ne 0 ]; then
            echo "Visual differences detected compared to main"

            # Check if PR branch already committed these baselines
            if [ -d "${BASELINE_DIR}-pr-copy" ]; then
              echo "Checking if changes are already committed in PR branch..."
              if diff -r visual-regression-output/new "${BASELINE_DIR}-pr-copy" > /dev/null 2>&1; then
                echo "New screenshots match PR's committed baselines - changes already accepted"
                echo "HAS_CHANGES=false" >> "$GITHUB_OUTPUT"
                exit 0
              else
                echo "New screenshots differ from PR's committed baselines"
                echo "HAS_CHANGES=true" >> "$GITHUB_OUTPUT"
                exit 1
              fi
            else
              echo "No baselines committed in PR branch yet"
              echo "HAS_CHANGES=true" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "HAS_CHANGES=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

      - name: Upload visual regression artifacts
        if: always() && steps.changed-files.outputs.any_changed == 'true' && steps.visual-regression.outputs.HAS_CHANGES == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: visual-regression-screenshots
          path: visual-regression-output/

      - name: Upload visual regression report
        if: always() && steps.changed-files.outputs.any_changed == 'true' && steps.visual-regression.outputs.HAS_CHANGES == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: visual-regression-report
          path: visual-regression-output/report.html
          archive: false

      - name: Generate PR comment
        if: always() && steps.changed-files.outputs.any_changed == 'true'
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HAS_CHANGES: ${{ steps.visual-regression.outputs.HAS_CHANGES }}
        run: |
          if [ "$HAS_CHANGES" == "true" ]; then
            cat > comment.md << 'EOF'
          ## 📸 Visual Regression Report

          This PR includes visual changes to the following components:

          EOF

            # Parse the log file for changes and list them
            grep -E "(\[FAIL\]|\[new\])" visual-regression.log | while read -r line; do
              if echo "$line" | grep -q "\[FAIL\]"; then
                story=$(echo "$line" | sed -n 's/.*\[FAIL\] \([^/]*\/[^ ]*\) differs.*/\1/p')
                echo "- 🔄 **Modified:** \`$story\`" >> comment.md

              elif echo "$line" | grep -q "\[new\]"; then
                story=$(echo "$line" | sed -n 's/.*\[new\] \([^/]*\/[^ ]*\) (new.*/\1/p')
                echo "- ✨ **New Component:** \`$story\`" >> comment.md
              fi
            done

            cat >> comment.md << EOF

          ---

          ### 📥 Review

          1. Go to the [workflow run](https://github.com/${REPOSITORY}/actions/runs/${RUN_ID})
          2. Click the **visual-regression-report** artifact to open the interactive HTML comparison report (slider, side-by-side, and toggle modes)
          3. Or download the **visual-regression-screenshots** artifact to compare images locally

          Or run \`holt snapshot\` locally to review and accept changes interactively.

          EOF
          else
            cat > comment.md << 'EOF'
          ## 📸 Visual Regression Report

          ✅ All component screenshots match their baselines. No visual changes detected.
          EOF
          fi

      - name: Update PR comment
        if: always() && steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          HAS_CHANGES: ${{ steps.visual-regression.outputs.HAS_CHANGES }}
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('comment.md', 'utf8');
            const hasChanges = process.env.HAS_CHANGES === 'true';

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('📸 Visual Regression Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
              console.log('Updated existing comment');
            } else if (hasChanges) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
              console.log('Created new comment');
            } else {
              console.log('No changes and no existing comment - skipping');
            }

      - name: Summary
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          HAS_CHANGES: ${{ steps.visual-regression.outputs.HAS_CHANGES }}
        run: |
          if [ "${HAS_CHANGES}" == "true" ]; then
            echo "📸 Visual changes detected - see PR comment for details"
          else
            echo "✅ No visual changes detected"
          fi
